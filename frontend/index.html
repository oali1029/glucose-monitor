<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CGM Dashboard — Glucose Monitor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f1117;
      --surface:     #1a1d27;
      --surface2:    #22263a;
      --border:      #2e3352;
      --text:        #e2e8f0;
      --text-muted:  #7c87a0;
      --accent:      #4f8ef7;
      --green:       #22c55e;
      --yellow:      #eab308;
      --orange:      #f97316;
      --red:         #ef4444;
      --radius:      12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    header h1 span { color: var(--accent); }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text-muted);
    }
    #last-update { font-size: 11px; }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 20px;
      display: grid;
      gap: 20px;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-areas:
        "glucose  glucose  device"
        "chart    chart    alerts"
        "chart    chart    alerts";
    }

    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
        grid-template-areas:
          "glucose" "device" "chart" "alerts";
      }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .card-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 14px;
      font-weight: 600;
    }

    #glucose-card { grid-area: glucose; }

    .glucose-value {
      font-size: 72px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -2px;
    }
    .glucose-unit {
      font-size: 18px;
      color: var(--text-muted);
      margin-left: 6px;
    }
    .glucose-meta {
      margin-top: 10px;
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .glucose-meta span strong { color: var(--text); }

    .range-bar {
      margin-top: 16px;
      position: relative;
      height: 8px;
      border-radius: 99px;
      background: linear-gradient(
        to right,
        var(--red)    0%,  
        var(--red)    13%,
        var(--green)  13%, 
        var(--green)  69%,
        var(--orange) 69%, 
        var(--orange) 100%
      );
    }
    .range-needle {
      position: absolute;
      top: -4px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 0 3px var(--accent);
      transition: left 0.5s ease;
    }
    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    #device-card { grid-area: device; }

    .device-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .device-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .device-row:last-child { border-bottom: none; }
    .device-label { color: var(--text-muted); }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
    }
    .pill.online  { background: rgba(34,197,94,.15); color: var(--green); }
    .pill.offline { background: rgba(239,68,68,.15);  color: var(--red);   }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
    }
    .dot.blink { animation: blink 1.4s infinite; }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.2; }
    }

    .bar-wrap {
      width: 100px;
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s;
    }

    #chart-card { grid-area: chart; min-height: 280px; }
    .chart-wrap { position: relative; height: 260px; }

    #alerts-card {
      grid-area: alerts;
      display: flex;
      flex-direction: column;
    }
    .alerts-list {
      flex: 1;
      overflow-y: auto;
      max-height: 400px;
    }
    .alert-item {
      background: var(--surface2);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      border-left: 4px solid transparent;
    }
    .alert-item.high   { border-color: var(--red);    }
    .alert-item.medium { border-color: var(--orange);  }
    .alert-item.low    { border-color: var(--yellow);  }
    .alert-item.acked  { opacity: 0.45; }

    .alert-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 4px;
    }
    .alert-type {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .alert-time {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .alert-msg { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
    .ack-btn {
      margin-top: 8px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 600;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      transition: all .15s;
    }
    .ack-btn:hover { background: var(--surface); color: var(--text); }

    .no-data {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 0;
      font-size: 13px;
    }

    .sev-high   { color: var(--red);    }
    .sev-medium { color: var(--orange); }
    .sev-low    { color: var(--yellow); }
  </style>
</head>
<body>

<header>
  <h1><span>Glucose</span> Monitor — Demo Patient</h1>
  <div class="status-bar">
    <span id="last-update">Connecting…</span>
  </div>
</header>

<main>

  <div class="card" id="glucose-card">
    <div class="card-title">Latest Glucose Reading</div>
    <div>
      <span class="glucose-value" id="glucose-val">—</span>
      <span class="glucose-unit">mg/dL</span>
    </div>
    <div class="glucose-meta">
      <span>Trend: <strong id="glucose-trend">—</strong></span>
      <span>Timestamp: <strong id="glucose-ts">—</strong></span>
    </div>
    <div class="range-bar">
      <div class="range-needle" id="range-needle" style="left:50%"></div>
    </div>
    <div class="range-labels">
      <span>0</span><span>70</span><span>180</span><span>300+</span>
    </div>
  </div>

  <div class="card" id="device-card">
    <div class="card-title">Device Status</div>
    <div class="device-name" id="device-name">—</div>
    <div class="device-row">
      <span class="device-label">Status</span>
      <span id="device-status-pill">—</span>
    </div>
    <div class="device-row">
      <span class="device-label">Battery</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="battery-pct">—</span>
        <div class="bar-wrap">
          <div class="bar-fill" id="battery-bar" style="width:0%;background:var(--green)"></div>
        </div>
      </div>
    </div>
    <div class="device-row">
      <span class="device-label">Signal</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="signal-pct">—</span>
        <div class="bar-wrap">
          <div class="bar-fill" id="signal-bar" style="width:0%;background:var(--accent)"></div>
        </div>
      </div>
    </div>
    <div class="device-row">
      <span class="device-label">Last seen</span>
      <span id="device-last-seen">—</span>
    </div>
  </div>

  <div class="card" id="chart-card">
    <div class="card-title">Glucose History (last 50 readings)</div>
    <div class="chart-wrap">
      <canvas id="glucose-chart"></canvas>
    </div>
  </div>

  <div class="card" id="alerts-card">
    <div class="card-title">Recent Alerts</div>
    <div class="alerts-list" id="alerts-list">
      <div class="no-data">No alerts yet</div>
    </div>
  </div>

</main>

<script>
  const API_BASE    = window.API_BASE || "http://localhost:8000";
  const PATIENT_ID  = "patient-001";
  const POLL_MS     = 5000;

  const ctx = document.getElementById("glucose-chart").getContext("2d");

  const refLinesPlugin = {
    id: "refLines",
    beforeDraw(chart) {
      const { ctx: c, scales: { x, y } } = chart;
      const drawLine = (val, color, label) => {
        if (!y || val < y.min || val > y.max) return;
        const yPos = y.getPixelForValue(val);
        c.save();
        c.strokeStyle = color;
        c.lineWidth = 1;
        c.setLineDash([5, 4]);
        c.beginPath();
        c.moveTo(x.left, yPos);
        c.lineTo(x.right, yPos);
        c.stroke();
        c.fillStyle = color;
        c.font = "10px sans-serif";
        c.fillText(label, x.right + 4, yPos + 3);
        c.restore();
      };
      drawLine(70,  "rgba(239,68,68,0.7)",   "Low");
      drawLine(180, "rgba(249,115,22,0.7)",  "High");
    }
  };
  Chart.register(refLinesPlugin);

  const glucoseChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: [],
      datasets: [{
        label: "Glucose mg/dL",
        data: [],
        borderColor: "#4f8ef7",
        backgroundColor: "rgba(79,142,247,0.08)",
        fill: true,
        tension: 0.35,
        pointRadius: 2,
        pointHoverRadius: 5,
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 400 },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.parsed.y.toFixed(0)} mg/dL`
          }
        }
      },
      scales: {
        x: {
          ticks: { color: "#7c87a0", maxTicksLimit: 8, maxRotation: 0 },
          grid:  { color: "rgba(255,255,255,0.04)" }
        },
        y: {
          min: 40, max: 320,
          ticks: { color: "#7c87a0" },
          grid:  { color: "rgba(255,255,255,0.04)" }
        }
      }
    }
  });

  function fmt(dateStr) {
    if (!dateStr) return "—";
    const d = new Date(dateStr);
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  function glucoseColor(val) {
    if (val < 70)  return "var(--red)";
    if (val > 180) return "var(--orange)";
    return "var(--green)";
  }

  function needleLeft(val) {
    const pct = Math.min(Math.max(val / 300, 0), 1) * 100;
    return pct.toFixed(1) + "%";
  }

  function trendArrow(readings) {
    if (readings.length < 2) return "—";
    const delta = readings[0].glucose_mg_dl - readings[1].glucose_mg_dl;
    if (delta >= 15)  return "↑↑ Rising fast";
    if (delta >= 5)   return "↑ Rising";
    if (delta <= -15) return "↓↓ Dropping fast";
    if (delta <= -5)  return "↓ Dropping";
    return "→ Stable";
  }


  function renderGlucose(latest, readings) {
    if (!latest) {
      document.getElementById("glucose-val").textContent = "—";
      return;
    }
    const val = latest.glucose_mg_dl;
    const el  = document.getElementById("glucose-val");
    el.textContent = val.toFixed(0);
    el.style.color = glucoseColor(val);

    document.getElementById("glucose-ts").textContent    = fmt(latest.timestamp);
    document.getElementById("glucose-trend").textContent = trendArrow(readings);
    document.getElementById("range-needle").style.left   = needleLeft(val);
  }

  function renderDevice(dev) {
    if (!dev) return;
    document.getElementById("device-name").textContent = dev.device_name;

    const online = dev.is_online;
    const pill   = document.getElementById("device-status-pill");
    pill.innerHTML = online
      ? `<span class="pill online"><span class="dot blink"></span>Online</span>`
      : `<span class="pill offline"><span class="dot"></span>Offline</span>`;

    const bat = dev.battery_level ?? 0;
    document.getElementById("battery-pct").textContent = bat.toFixed(0) + "%";
    const batBar = document.getElementById("battery-bar");
    batBar.style.width = bat + "%";
    batBar.style.background = bat < 20 ? "var(--red)" : bat < 50 ? "var(--yellow)" : "var(--green)";

    const sig = dev.signal_strength ?? 0;
    document.getElementById("signal-pct").textContent  = sig.toFixed(0) + "%";
    document.getElementById("signal-bar").style.width  = sig + "%";

    document.getElementById("device-last-seen").textContent = fmt(dev.last_seen_at);
  }

  function renderChart(readings) {
    const chronological = [...readings].reverse();
    glucoseChart.data.labels   = chronological.map(r => fmt(r.timestamp));
    glucoseChart.data.datasets[0].data = chronological.map(r => r.glucose_mg_dl);

    glucoseChart.data.datasets[0].pointBackgroundColor =
      chronological.map(r => glucoseColor(r.glucose_mg_dl));

    glucoseChart.update("none");
  }

  function renderAlerts(alerts) {
    const list = document.getElementById("alerts-list");
    if (!alerts || alerts.length === 0) {
      list.innerHTML = `<div class="no-data">No alerts yet</div>`;
      return;
    }
    list.innerHTML = alerts.map(a => `
      <div class="alert-item ${a.severity} ${a.acknowledged ? "acked" : ""}" data-id="${a.id}">
        <div class="alert-header">
          <span class="alert-type sev-${a.severity}">${a.alert_type.replace(/_/g," ")}</span>
          <span class="alert-time">${fmt(a.created_at)}</span>
        </div>
        <div class="alert-msg">${a.message}</div>
        ${!a.acknowledged
          ? `<button class="ack-btn" onclick="ackAlert('${a.id}')">Acknowledge</button>`
          : `<span style="font-size:11px;color:var(--text-muted);margin-top:6px;display:block">✓ Acknowledged</span>`
        }
      </div>
    `).join("");
  }

  async function ackAlert(id) {
    try {
      const resp = await fetch(`${API_BASE}/alerts/${id}/acknowledge`, { method: "POST" });
      if (resp.ok) refresh(); 
    } catch(e) { console.error("ack failed", e); }
  }


  async function refresh() {
    try {
      const resp = await fetch(`${API_BASE}/dashboard/summary`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      renderGlucose(data.latest_reading, data.recent_readings);
      renderDevice(data.device_status);
      renderChart(data.recent_readings);
      renderAlerts(data.recent_alerts);

      document.getElementById("last-update").textContent =
        "Updated " + new Date().toLocaleTimeString();
    } catch (err) {
      document.getElementById("last-update").textContent = "⚠ Connection error";
      console.error("Polling error:", err);
    }
  }

  refresh();
  setInterval(refresh, POLL_MS);
</script>
</body>
</html>
